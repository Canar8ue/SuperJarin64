name: Build SuperJarin64

on:
  push:
    branches: [ "*" ]
  pull_request:
    branches: [ "*" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkgconf git binutils-mips-linux-gnu python3 zlib1g-dev libaudiofile-dev

      - name: Download Baseline ROM
        env:
          BASEROM_URL: ${{ secrets.BASEROM_URL }}
        run: |
          if [ -z "$BASEROM_URL" ]; then
            echo "::error::GitHub Secret 'BASEROM_URL' is missing! Please upload your baserom.us.z64 to a file sharing host and add its download URL as a secret."
            exit 1
          fi
          curl -L -o baserom.us.z64 "$BASEROM_URL"

      - name: Compile ROM
        run: |
          make VERSION=us COMPARE=0 -j$(nproc)

      - name: Upload Compiled ROM Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sm64-us-rom
          path: build/us/sm64.us.z64
